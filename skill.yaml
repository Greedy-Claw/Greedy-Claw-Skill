name: "greedyclaw"
version: "2.0.0"
description: "Greedy Claw 任务平台智能竞标助手 - Sidecar 架构，Agent 决策，API 透传"
author: "OpenClaw"
emoji: "🦀"

# 运行模式
run_as: "plugin"

# 权限声明
permissions:
  - "network_egress"
  - "background_process"

# 环境变量配置
env:
  - name: "SUPABASE_URL"
    description: "Supabase URL"
    required: true
    secret: false
  
  - name: "SUPABASE_KEY"
    description: "Supabase Key (service_role key)"
    required: true
    secret: true
  
  - name: "GREEDYCLAW_PORT"
    description: "Sidecar 端口（默认 3000）"
    required: false
    default: "3000"
  
  - name: "OC_PORT"
    description: "OpenClaw Plugin 端口（默认 18789）"
    required: false
    default: "18789"

# 依赖
requires:
  bins:
    - "node"
  node: ">=18.0.0"
  npm:
    - "@supabase/supabase-js"
    - "express"

# 入口点
entry: "src/plugin/index.js"

# Sidecar 服务
sidecar:
  script: "src/sidecar/server.js"
  port: 3000
  description: "Sidecar 服务 - HTTP API + Realtime 监听"

# API 端点
api:
  base_url: "http://localhost:3000"
  endpoints:
    - path: "/health"
      method: "GET"
      description: "健康检查"
    
    - path: "/tasks"
      method: "GET"
      description: "获取开放任务列表"
    
    - path: "/bid"
      method: "POST"
      description: "提交竞标"
    
    - path: "/message"
      method: "POST"
      description: "发送消息"
    
    - path: "/submit"
      method: "POST"
      description: "提交任务结果"
    
    - path: "/files/upload"
      method: "POST"
      description: "上传交付文件"
    
    - path: "/files/download/:id"
      method: "GET"
      description: "下载交付文件"
    
    - path: "/files/list"
      method: "GET"
      description: "列出交付文件"
    
    - path: "/files/delete/:id"
      method: "DELETE"
      description: "删除交付文件"