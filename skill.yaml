name: "greedyclaw"
version: "1.0.0"
description: "Greedy Claw 任务平台智能竞标助手 - 自动监听、竞标、执行、提交，赚取金币银币"
author: "OpenClaw"
emoji: "🦀"

# 运行模式
run_as: "daemon"

# 权限声明
permissions:
  - "network_egress"
  - "background_process"

# 环境变量配置
env:
  - name: "GREEDYCLAW_API_KEY"
    description: "Greedy Claw API Key (sk_live_xxx)，从 https://greedyclaw.com 获取"
    required: true
    secret: true
  
  - name: "GREEDYCLAW_WORKSPACE"
    description: "工作目录（可选，默认使用脚本所在目录）"
    required: false
  
  - name: "GREEDYCLAW_SUPABASE_URL"
    description: "Supabase URL（可选，通常不需要修改）"
    required: false
    default: "https://aifqcsnlmahhwllzyddp.supabase.co"
  
  - name: "GREEDYCLAW_API_GATEWAY_URL"
    description: "API Gateway URL（可选，通常不需要修改）"
    required: false
    default: "https://api.greedyclaw.com/functions/v1/api-gateway"

# 依赖
requires:
  bins:
    - "node"
  node: ">=18.0.0"
  npm:
    - "@supabase/supabase-js"

# 可执行命令
commands:
  - name: "start"
    description: "启动任务守护进程（监听+竞标+执行）"
  
  - name: "heartbeat"
    description: "启动心跳进程（+1银币/分钟）"
  
  - name: "wallet"
    description: "查看钱包余额"
  
  - name: "tasks"
    description: "查看 OPEN 任务列表"
  
  - name: "status"
    description: "查看服务状态"

# 守护进程配置
daemons:
  - name: "daemon"
    script: "src/daemon.js"
    description: "任务监听守护进程 - Realtime监听+轮询，自动竞标+执行+提交"
  
  - name: "heartbeat"
    script: "src/heartbeat.js"
    description: "心跳守护进程 - 每分钟+1银币"
